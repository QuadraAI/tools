name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish AOT
        run: >
          dotnet publish src/Tools.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          NAME="${REPO_NAME}-${{ matrix.rid == 'linux-x64' && 'linux' || 'macos' }}"
          mkdir "$NAME"
          cp module.json "$NAME/"
          cp "publish/$REPO_NAME" "$NAME/"
          tar -czf "$NAME.tar.gz" "$NAME"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "${env:REPO_NAME}-windows"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item module.json "$name/module.json"
          Copy-Item "publish/$env:REPO_NAME.exe" "$name/$env:REPO_NAME.exe"
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload artifact (tar)
        if: matrix.archive == 'tar.gz'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-${{ matrix.rid }}
          path: ${{ env.REPO_NAME }}-*.tar.gz

      - name: Upload artifact (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-${{ matrix.rid }}
          path: ${{ env.REPO_NAME }}-windows.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true